name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test (JDK ${{ matrix.java }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        java: [ '21', '25' ]
        os: [ ubuntu-latest ]
        include:
          - java: '21'
            os: macos-latest
          - java: '21'
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'maven'

      - name: Build & Test
        run: mvn -B -T 1C clean test --file pom.xml

      - name: Verify coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.java == '21'
        run: |
          echo "Checking for jacoco.xml..."
          ls -la core3/target/site/jacoco/jacoco.xml || echo "File not found!"
          wc -l core3/target/site/jacoco/jacoco.xml || echo "Cannot count lines!"

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.java == '21'
        uses: codecov/codecov-action@v5
        with:
          files: ./core3/target/site/jacoco/jacoco.xml
          flags: core3
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
          name: codecov-umbrella

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jdk${{ matrix.java }}-${{ matrix.os }}
          path: '**/target/surefire-reports/'
          retention-days: 7
