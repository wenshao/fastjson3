name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '*.txt'
      - '.gitignore'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '*.txt'
      - '.gitignore'
  schedule:
    - cron: '0 18 * * *'  # 每天北京时间凌晨 2 点 (UTC 18:00) 运行 android-test-full
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    name: Build & Test (JDK ${{ matrix.java }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        java: [ '21', '25' ]
        os: [ ubuntu-latest ]
        include:
          - java: '21'
            os: macos-latest
          - java: '21'
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'maven'

      - name: Build & Test
        run: mvn -B -T 1C clean test --file pom.xml

      - name: Verify coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.java == '21'
        run: |
          echo "Checking for jacoco.xml..."
          ls -la core3/target/site/jacoco/jacoco.xml || echo "File not found!"
          wc -l core3/target/site/jacoco/jacoco.xml || echo "Cannot count lines!"

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.java == '21'
        uses: codecov/codecov-action@v5
        with:
          files: ./core3/target/site/jacoco/jacoco.xml
          flags: core3
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
          name: codecov-umbrella

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jdk${{ matrix.java }}-${{ matrix.os }}
          path: '**/target/surefire-reports/'
          retention-days: 7

  android-test:
    name: Android Test (Quick)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build Android JAR
        run: mvn -B package -Pandroid -pl core3 -am -DskipTests

      - name: Verify Android JAR
        run: |
          echo "Checking Android JAR contents..."
          JAR=$(find core3/target -name "fastjson3-*-android.jar")
          echo "Android JAR: $JAR"

          # Check JAR size
          SIZE=$(stat -c%s "$JAR")
          echo "JAR size: $SIZE bytes"
          if [ $SIZE -gt 600000 ]; then
            echo "Error: Android JAR too large ($SIZE bytes)"
            exit 1
          fi
          if [ $SIZE -lt 300000 ]; then
            echo "Error: Android JAR too small ($SIZE bytes)"
            exit 1
          fi

          # Verify ASM classes are excluded (check actual .class files, not just directory)
          ASM_CLASSES=$(jar tf "$JAR" | grep "internal/asm/.*\.class$" || true)
          if [ -n "$ASM_CLASSES" ]; then
            echo "Error: ASM classes found in Android JAR:"
            echo "$ASM_CLASSES"
            exit 1
          fi
          echo "Verified: ASM classes excluded"

          # Verify ASM Creator classes are excluded
          if jar tf "$JAR" | grep -q "ObjectReaderCreatorASM\.class"; then
            echo "Error: ObjectReaderCreatorASM.class should be excluded from Android JAR"
            exit 1
          fi
          if jar tf "$JAR" | grep -q "ObjectWriterCreatorASM\.class"; then
            echo "Error: ObjectWriterCreatorASM.class should be excluded from Android JAR"
            exit 1
          fi
          echo "Verified: ASM Creator classes excluded"

          # Verify DynamicClassLoader is excluded
          if jar tf "$JAR" | grep -q "DynamicClassLoader\.class"; then
            echo "Error: DynamicClassLoader.class should be excluded from Android JAR"
            exit 1
          fi
          echo "Verified: DynamicClassLoader excluded"

          echo "Android JAR verification passed!"

      - name: Run Android tests
        run: mvn -B test -pl core3-android-test

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: 'core3-android-test/target/surefire-reports/'
          retention-days: 7

  android-test-full:
    name: Android Test (Emulator)
    runs-on: macos-latest
    if: (github.event_name == 'workflow_dispatch') || (github.event_name == 'schedule' && github.ref == 'refs/heads/main')
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 26
          target: default
          arch: x86_64
          profile: Nexus 6
          script: mvn -B test -pl core3-android-test

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-emulator-test-reports
          path: 'core3-android-test/target/surefire-reports/'
          retention-days: 7
