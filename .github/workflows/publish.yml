name: Publish SNAPSHOT

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Publish core3 and core3-kotlin
        run: mvn -B deploy -pl core3,core3-kotlin -am -DskipTests -DaltDeploymentRepository=github::https://maven.pkg.github.com/wenshao/fastjson3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
