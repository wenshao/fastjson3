name: Publish SNAPSHOT

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Publish reactor
        # Deploys 15 artifacts: the root parent (fastjson3-parent), core3,
        # core3-bom, core3-kotlin, core3-spring (jar), core3-spring-boot-
        # autoconfigure (jar), core3-spring-boot-starter (pom-only),
        # core3-jaxrs aggregator + jakarta/javax submodules, core3-jpa
        # aggregator + jakarta/javax submodules, core3-kafka, core3-mybatis.
        # Test-harness modules (core3-android-test, core3-spring-test) opt
        # out via the `maven.deploy.skip` property in their poms.
        # `-fae` (--fail-at-end): a single transient upload failure won't
        # abort the rest of the reactor — independent modules continue,
        # and the workflow still exits non-zero if any failed.
        run: mvn -B -fae deploy -DskipTests -DaltDeploymentRepository=github::https://maven.pkg.github.com/wenshao/fastjson3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
