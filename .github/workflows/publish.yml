name: Publish SNAPSHOT

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Publish reactor
        # Deploys 15 artifacts: the root parent (fastjson3-parent), core3,
        # core3-bom, core3-kotlin, core3-spring (jar), core3-spring-boot-
        # autoconfigure (jar), core3-spring-boot-starter (pom-only),
        # core3-jaxrs aggregator + jakarta/javax submodules, core3-jpa
        # aggregator + jakarta/javax submodules, core3-kafka, core3-mybatis.
        # Test-harness modules (core3-android-test, core3-spring-test) opt
        # out via the `maven.deploy.skip` property in their poms.
        #
        # `-Dmaven.test.skip=true` (vs -DskipTests): skips both test-compile
        # AND test-execution. Required because core3-android-test depends on
        # `fastjson3:android` (the Android classifier jar built only under
        # `-Pandroid`), which isn't available in a fresh CI environment.
        # `-DskipTests` alone would fail at test-compile.
        #
        # `-DdeployAtEnd=true`: postpones all maven-deploy-plugin uploads
        # until the entire reactor build finishes successfully. If any
        # module's build fails, no module deploys — atomic SNAPSHOT publish
        # rather than partial reactor state on GitHub Packages.
        run: mvn -B deploy -Dmaven.test.skip=true -DdeployAtEnd=true -DaltDeploymentRepository=github::https://maven.pkg.github.com/wenshao/fastjson3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
